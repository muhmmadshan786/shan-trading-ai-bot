Chris<!DOCTYPE html>
<html>
<head>
<title>Shan Trading AI Bot</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}
.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
}

select{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
color:white;
border:1px solid #00ff66;
border-radius:10px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#00cc44;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.signal{
font-size:35px;
margin-top:20px;
font-weight:bold;
}

.timer{
font-size:22px;
margin-top:15px;
color:#00ff66;
}
</style>

</head>

<body>

<div class="card">

<h1 style="color:yellow;">TEST 999</h1>

<select id="pair">
<option>EUR/USD OTC</option>
<option>GBP/USD OTC</option>
<option>AUD/USD OTC</option>
<option>USD/JPY OTC</option>
</select>

<select id="time">

<option>5 Seconds</option>
<option>10 Seconds</option>
<option>15 Seconds</option>
<option>30 Seconds</option>
<option>1 Minute</option>
<option>2 Minutes</option>
<option>3 Minutes</option>
<option>4 Minutes</option>
<option>5 Minutes</option>

</select>

<button onclick="signal()">
GET SIGNAL
</button>

<div class="signal" id="result">
WAITING...
</div>

<div class="timer" id="timer">
00
</div>

</div>

<script>

function signal(){

let s=Math.random();

if(s>0.5){

document.getElementById("result").innerHTML="🟢 UP";

}else{

document.getElementById("result").innerHTML="🔴 DOWN";

}

let count=5;

document.getElementById("timer").innerHTML=count;

let x=setInterval(function(){

count--;

document.getElementById("timer").innerHTML=count;

if(count<=0){

clearInterval(x);

}

},1000);

}

</script>

</body>
</html>
