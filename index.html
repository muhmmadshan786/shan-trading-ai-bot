<!DOCTYPE html>
<html>
<head>
<title>Shan Trading AI Bot</title>
<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

select{
width:90%;
padding:12px;
margin:10px;
background:#222;
color:white;
border:1px solid #00ff66;
border-radius:10px;
}

button{
background:#00cc44;
color:white;
padding:15px;
border:none;
border-radius:10px;
width:90%;
font-size:18px;
}

.signal{
font-size:35px;
margin-top:20px;
color:#00ff66;
}

.timer{
font-size:22px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h1>Shan Trading AI Bot</h1>

<select>
<option>EUR/USD OTC</option>
<option>GBP/USD OTC</option>
<option>AUD/USD OTC</option>
<option>USD/JPY OTC</option>
</select>

<select>

<option>5 Seconds</option>
<option>10 Seconds</option>
<option>15 Seconds</option>
<option>30 Seconds</option>
<option>1 Minute</option>
<option>2 Minutes</option>
<option>3 Minutes</option>
<option>4 Minutes</option>
<option>5 Minutes</option>

</select>

<button>

GET SIGNAL

</button>

<div class="signal">

🟢 UP

</div>

<div class="timer">

00:05

</div>

</div>

</body>
</html>
